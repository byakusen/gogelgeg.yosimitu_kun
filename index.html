<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>義満くん 〜室町ものしり問答〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Maru+Gothic:wght@500;700;900&family=Klee+One:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --sumi:#1a1410;       /* 墨 */
    --sumi2:#241c15;
    --kin:#d9a441;        /* 金 */
    --kin-akarui:#f2cd6b;
    --aka:#b03a2e;        /* 朱 */
    --aka-fuka:#7d241c;
    --washi:#f4ead6;      /* 和紙 */
    --washi-kage:#e7d8ba;
    --midori:#5c7a4a;
    --sumi-usu:rgba(244,234,214,.7);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Zen Maru Gothic',sans-serif;
    background:
      radial-gradient(ellipse at 50% -10%, #3a2c1d 0%, transparent 55%),
      radial-gradient(ellipse at 50% 120%, #2a1d12 0%, transparent 55%),
      var(--sumi);
    color:var(--washi);
    min-height:100%;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
    position:relative;
  }
  /* 和紙テクスチャ風のノイズ */
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);
    pointer-events:none;z-index:0;
  }

  /* ヘッダー（のぼり旗風） */
  header{
    position:relative;z-index:2;
    text-align:center;
    padding:18px 16px 10px;
    border-bottom:3px solid var(--kin);
    background:linear-gradient(180deg, rgba(125,36,28,.35), transparent);
  }
  .mon{
    display:inline-flex;align-items:center;gap:14px;
  }
  .mon-maru{
    width:46px;height:46px;border-radius:50%;
    border:3px solid var(--kin);
    display:grid;place-items:center;
    font-family:'Yuji Syuku',serif;font-size:24px;color:var(--kin-akarui);
    background:radial-gradient(circle,#3a2c1d,#1a1410);
  }
  h1{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(28px,4.2vw,52px);
    color:var(--kin-akarui);
    letter-spacing:.12em;
    text-shadow:0 2px 0 #000,0 0 18px rgba(217,164,65,.35);
  }
  .sub{
    font-size:clamp(13px,1.5vw,18px);
    color:var(--sumi-usu);
    margin-top:4px;letter-spacing:.18em;
  }

  /* メイン舞台 */
  main{
    position:relative;z-index:2;
    flex:1;
    width:min(1100px,94vw);
    margin:0 auto;
    padding:22px 0 30px;
    display:flex;flex-direction:column;gap:20px;
  }

  /* 義満の語り場 */
  .stage{
    display:flex;align-items:flex-start;gap:22px;
  }
  .nobunaga{
    flex:0 0 auto;
    width:clamp(120px,15vw,180px);
    text-align:center;
  }
  .face{
    width:clamp(120px,15vw,180px);
    height:clamp(120px,15vw,180px);
    border-radius:50%;
    overflow:hidden;
    background:#241c15;
    border:5px solid var(--kin);
    box-shadow:0 0 0 4px var(--sumi),0 10px 30px rgba(0,0,0,.5);
    position:relative;
    transition:transform .25s;
  }
  .face .mouth{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .face .mouth.closed{z-index:1;}
  .face .mouth.open{z-index:2;opacity:0;}   /* ふだんは閉じた口。話すとき重ねて見せる */
  .face.talking-open .mouth.open{opacity:1;}
  .face.no-img .mouth{display:none;}
  .face-fallback{
    display:none;
    position:absolute;inset:0;z-index:3;
    width:100%;height:100%;
    align-items:center;justify-content:center;
    font-family:'Yuji Syuku',serif;
    font-size:clamp(20px,2.6vw,32px);line-height:1.15;
    color:var(--kin-akarui);letter-spacing:.05em;
    background:radial-gradient(circle at 50% 38%, #3a2c1d, #1a1410);
  }
  .face.no-img .face-fallback{display:flex;}
  .face.talk{} /* 話し始めの顔の動きはなし（うなずき・傾きとも無効） */
  .name-tag{
    margin-top:10px;font-family:'Yuji Syuku',serif;
    font-size:clamp(16px,2vw,24px);color:var(--kin-akarui);letter-spacing:.1em;
  }

  /* 吹き出し（巻物風） */
  .scroll{
    flex:1;position:relative;
    background:linear-gradient(180deg,var(--washi),var(--washi-kage));
    color:var(--sumi);
    border-radius:14px;
    padding:26px 30px;
    min-height:170px;
    box-shadow:0 12px 34px rgba(0,0,0,.45),inset 0 0 0 3px rgba(125,36,28,.25);
    border:2px solid var(--kin);
  }
  .scroll::before{ /* 吹き出しのしっぽ */
    content:"";position:absolute;left:-18px;top:48px;
    border-style:solid;border-width:14px 18px 14px 0;
    border-color:transparent var(--kin) transparent transparent;
  }
  .scroll .answer{
    font-family:'Klee One',serif;
    font-size:clamp(20px,2.6vw,32px);
    line-height:1.75;font-weight:600;
    letter-spacing:.02em;
  }
  .scroll .answer .em{color:var(--aka-fuka);font-weight:700;}

  /* 質問エリア */
  .ask-zone{
    background:rgba(36,28,21,.7);
    border:2px solid var(--kin);
    border-radius:14px;
    padding:18px 20px;
  }
  .ask-zone .label{
    font-size:clamp(15px,1.7vw,20px);color:var(--kin-akarui);
    margin-bottom:12px;letter-spacing:.1em;font-weight:700;
  }
  .input-row{display:flex;gap:12px;flex-wrap:wrap;}
  #q{
    flex:1;min-width:220px;
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:clamp(18px,2.2vw,26px);font-weight:500;
    padding:14px 18px;border-radius:10px;border:none;
    background:var(--washi);color:var(--sumi);
  }
  #q:focus{outline:3px solid var(--kin-akarui);}
  .btn-ask{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(18px,2.2vw,26px);
    padding:14px 28px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--aka),var(--aka-fuka));
    color:var(--washi);letter-spacing:.1em;
    box-shadow:0 4px 0 #511712,0 6px 14px rgba(0,0,0,.4);
    transition:transform .08s;
  }
  .btn-ask:active{transform:translateY(4px);box-shadow:0 1px 0 #511712;}

  /* おすすめ問い */
  .topics{margin-top:8px;}
  .topics .t-label{font-size:clamp(13px,1.5vw,17px);color:var(--sumi-usu);margin:6px 2px 12px;letter-spacing:.08em;}
  .chips{display:flex;flex-wrap:wrap;gap:10px;}
  .chip{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;
    font-size:clamp(15px,1.8vw,21px);
    padding:11px 18px;border-radius:999px;cursor:pointer;
    background:rgba(244,234,214,.08);
    color:var(--washi);
    border:2px solid var(--kin);
    transition:all .15s;
  }
  .chip:hover{background:var(--kin);color:var(--sumi);transform:translateY(-2px);}

  .panel{display:none;}
  .panel.show{display:block;}

  /* 顔のリアクション */
  .face.seikai{box-shadow:0 0 0 4px var(--sumi),0 0 34px 6px rgba(217,164,65,.85),0 10px 30px rgba(0,0,0,.5);}

  footer{
    position:relative;z-index:2;text-align:center;
    font-size:13px;color:rgba(244,234,214,.4);
    padding:14px;letter-spacing:.1em;
  }
  @media(max-width:560px){
    .stage{flex-direction:column;align-items:center;}
    .scroll::before{display:none;}
    .nobunaga{order:-1;}
  }

  /* ===== タブ ===== */
  .tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:2px 0 4px;}
  .tab{
    font-family:'Yuji Syuku',serif;font-size:clamp(15px,1.9vw,22px);
    padding:9px 20px;border-radius:999px;cursor:pointer;
    background:rgba(244,234,214,.06);color:var(--washi);
    border:2px solid var(--kin);letter-spacing:.06em;transition:all .15s;
  }
  .tab:hover{background:rgba(217,164,65,.25);}
  .tab.active{background:var(--kin);color:var(--sumi);font-weight:700;box-shadow:0 4px 0 #7d5a18;}

  /* ===== クイズ ===== */
  .quiz-zone{background:rgba(36,28,21,.7);border:2px solid var(--kin);border-radius:14px;padding:20px;}
  .quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .quiz-count{font-size:clamp(14px,1.6vw,18px);color:var(--kin-akarui);letter-spacing:.08em;font-weight:700;}
  .quiz-score{font-size:clamp(14px,1.6vw,18px);color:var(--washi);}
  .quiz-q{font-family:'Klee One',serif;font-weight:600;font-size:clamp(19px,2.4vw,28px);line-height:1.6;color:var(--washi);margin-bottom:16px;}
  .quiz-choices{display:flex;flex-direction:column;gap:12px;}
  .qbtn{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(17px,2vw,24px);text-align:left;
    padding:14px 18px;border-radius:10px;cursor:pointer;background:var(--washi);color:var(--sumi);
    border:3px solid transparent;transition:all .12s;
  }
  .qbtn:hover{border-color:var(--kin);transform:translateY(-2px);}
  .qbtn:disabled{cursor:default;transform:none;opacity:.9;}
  .qbtn.correct{background:#cfe6b4;border-color:#5c7a4a;color:#28381c;}
  .qbtn.wrong{background:#edb9b2;border-color:#7d241c;color:#4a1410;}
  .quiz-next{
    margin-top:16px;font-family:'Yuji Syuku',serif;font-size:clamp(17px,2vw,24px);
    padding:12px 26px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--aka),var(--aka-fuka));color:var(--washi);
    letter-spacing:.08em;box-shadow:0 4px 0 #511712;display:none;
  }
  .quiz-next.show{display:inline-block;}
  .quiz-result{text-align:center;}
  .quiz-result .big{font-family:'Yuji Syuku',serif;font-size:clamp(26px,4vw,44px);color:var(--kin-akarui);margin:10px 0;}

  /* ===== 地図 ===== */
  .map-zone{background:rgba(36,28,21,.7);border:2px solid var(--kin);border-radius:14px;padding:16px;}
  .map-tools{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
  .map-tools .mbtn{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(14px,1.6vw,18px);
    padding:7px 16px;border-radius:999px;cursor:pointer;
    background:rgba(244,234,214,.08);color:var(--washi);border:2px solid var(--kin);
  }
  .map-tools .mbtn.active{background:var(--kin);color:var(--sumi);}
  .map-tools label{font-size:clamp(13px,1.5vw,17px);color:var(--washi);display:inline-flex;align-items:center;gap:5px;cursor:pointer;}
  #map-card{background:#fff;border-radius:10px;overflow:hidden;border:2px solid var(--kin);}
  #japan-map{width:100%;height:auto;display:block;}
  #japan-map .prefecture polygon,#japan-map .prefecture path{fill:#EEEEEE;stroke:#000;stroke-width:1;stroke-linejoin:round;}
  .prefecture[data-region="北海道・東北"] polygon,.prefecture[data-region="北海道・東北"] path{fill:#f2a59a;}
  .prefecture[data-region="関東"] polygon,.prefecture[data-region="関東"] path{fill:#f5d56e;}
  .prefecture[data-region="中部"] polygon,.prefecture[data-region="中部"] path{fill:#b5d49a;}
  .prefecture[data-region="近畿"] polygon,.prefecture[data-region="近畿"] path{fill:#94c5d6;}
  .prefecture[data-region="中国"] polygon,.prefecture[data-region="中国"] path{fill:#c5a6d6;}
  .prefecture[data-region="四国"] polygon,.prefecture[data-region="四国"] path{fill:#f0a8c8;}
  .prefecture[data-region="九州"] polygon,.prefecture[data-region="九州"] path{fill:#ffb878;}
  .prefecture[data-code="1"] polygon,.prefecture[data-code="1"] path{fill:#f7c08a;}
  .label-layer{display:none;}
  .label-layer text{font-size:14px;fill:#2b2b2b;text-anchor:middle;dominant-baseline:middle;paint-order:stroke;stroke:#fff;stroke-width:3px;pointer-events:none;}
  #map-card.show-labels .label-layer{display:block;}
  .ym-marker circle{fill:var(--aka);stroke:#fff;stroke-width:1.6;cursor:pointer;}
  .ym-marker text{fill:#fff;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;text-anchor:middle;dominant-baseline:central;pointer-events:none;}
  .ym-marker.sel circle{fill:#f2cd6b;stroke:var(--aka-fuka);}
  .map-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .leg{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(14px,1.6vw,19px);
    padding:8px 14px;border-radius:10px;cursor:pointer;
    background:rgba(244,234,214,.08);color:var(--washi);border:2px solid var(--kin);
    display:flex;align-items:center;gap:8px;
  }
  .leg:hover{background:rgba(217,164,65,.25);}
  .leg .num{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:50%;background:var(--aka);color:#fff;font-size:14px;}
  .leg.sel{background:var(--kin);color:var(--sumi);}
  .leg.sel .num{background:var(--aka-fuka);}

  /* ===== 年表 ===== */
  .tl-zone{background:rgba(36,28,21,.7);border:2px solid var(--kin);border-radius:14px;padding:20px 18px;}
  .tl-hint{font-size:clamp(13px,1.5vw,17px);color:var(--sumi-usu);margin-bottom:14px;letter-spacing:.06em;}
  .tl{position:relative;margin-left:8px;padding-left:30px;}
  .tl::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:3px;background:var(--kin);}
  .tl-item{position:relative;margin-bottom:18px;cursor:pointer;}
  .tl-item::before{content:"";position:absolute;left:-29px;top:4px;width:15px;height:15px;border-radius:50%;background:var(--washi);border:3px solid var(--aka);transition:all .12s;}
  .tl-item:hover::before,.tl-item.sel::before{background:var(--kin-akarui);transform:scale(1.25);}
  .tl-year{font-family:'Yuji Syuku',serif;font-size:clamp(17px,2vw,24px);color:var(--kin-akarui);letter-spacing:.04em;}
  .tl-title{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(16px,1.9vw,22px);color:var(--washi);margin-top:2px;}
</style>
</head>

  <header>
    <div class="mon">
      <span class="mon-maru">足</span>
      <div>
        <h1>義満くん</h1>
        <div class="sub">むろまち ものしり もんどう</div>
      </div>
      <span class="mon-maru">利</span>
    </div>
  </header>

  <main>
    <div class="stage">
      <div class="nobunaga">
        <div class="face" id="face">
          <img class="mouth closed" src="https://raw.githubusercontent.com/byakusen/gogelgeg.yosimitu_kun/main/yosimitu.png" alt="足利義満"

          <span class="face-fallback">足<br>利<br>義<br>満</span>
        </div>
        <div class="name-tag">足利義満</div>
      </div>
      <div class="scroll">
        <div class="answer" id="answer"></div>
      </div>
    </div>

    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="qa">問答</button>
      <button class="tab" data-tab="quiz">クイズ</button>
      <button class="tab" data-tab="map">地図</button>
      <button class="tab" data-tab="timeline">年表</button>
    </nav>

    <div class="panel show" id="panel-qa">
      <div class="ask-zone">
        <div class="label">▼ 義満くんに きいてみよう</div>
        <div class="input-row">
          <input id="q" type="text" placeholder="しつもんを 入力してね（れい：金閣ってなに？）" autocomplete="off">
          <button class="btn-ask" id="askBtn">きく</button>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-quiz">
      <div class="quiz-zone" id="quiz-zone"></div>
    </div>

    <div class="panel" id="panel-map">
      <div class="map-zone">
        <div class="map-tools">
          <button class="mbtn active" data-view="全国">全国</button>
          <button class="mbtn" data-view="近畿">みやこ周辺</button>
          <label><input type="checkbox" id="toggle-labels"> 県名を表示</label>
        </div>
        <div id="map-card">

// 入力にいちばん合う答えをさがす
function findAnswer(text){
  const t = (text||"").replace(/\s/g,"");
  if(!t) return null;
  let best=null, bestScore=0;
  for(const item of KB){
    let score=0;
    for(const k of item.keys){ if(t.includes(k)) score += k.length; }
    if(score>bestScore){bestScore=score; best=item;}
  }
  return bestScore>0 ? best.a : null;
}

// ===== タイプライター表示 =====
const answerEl = document.getElementById('answer');
const faceEl = document.getElementById('face');
let typing=null;
let mouthTimer=null;
function startMouth(){
  stopMouth();
  // 口を開いた絵と閉じた絵をすばやく切り替えて「ぱくぱく」させる
  mouthTimer=setInterval(()=>{ faceEl.classList.toggle('talking-open'); },130);
}
function stopMouth(){
  if(mouthTimer){ clearInterval(mouthTimer); mouthTimer=null; }
  faceEl.classList.remove('talking-open'); // 話し終わりは口を閉じた絵にもどす
}
function speak(text, mood){
  faceEl.classList.remove('talk','seikai','zannen'); void faceEl.offsetWidth;
  faceEl.classList.add(mood || 'talk');
  startMouth();
  if(typing) clearInterval(typing);
  answerEl.innerHTML="";
  let i=0;
  typing=setInterval(()=>{
    if(i>=text.length){clearInterval(typing); stopMouth(); return;}
    answerEl.appendChild(document.createTextNode(text[i]));
    i++;
  },32);
}

function handleAsk(text){
  const a = findAnswer(text);
  if(a){ speak(a); }
  else{ speak(NOT_FOUND[Math.floor(Math.random()*NOT_FOUND.length)]); }
}

const qEl=document.getElementById('q');

// IME（日本語入力）の変換確定中かどうかを記録する
let composing=false;
qEl.addEventListener('compositionstart',()=>{ composing=true; });
qEl.addEventListener('compositionend',()=>{ composing=false; });

document.getElementById('askBtn').onclick=()=>handleAsk(qEl.value);
qEl.addEventListener('keydown',e=>{
  // 漢字変換などの確定リターンでは送信しない。
  // 変換が確定し、ふつうにリターンを押したときだけ質問を送る。
  if(e.key==='Enter' && !composing && !e.isComposing){
    handleAsk(qEl.value);
  }
});

const QUIZ_N = 10; // 1かいに出す問題数
let quizOrder=[], quizIdx=0, quizScore=0;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(){
  quizOrder=shuffle(QUIZ.map((_,i)=>i)).slice(0,Math.min(QUIZ_N,QUIZ.length));
  quizIdx=0; quizScore=0; renderQuestion();
}
function renderQuestion(){
  const zone=document.getElementById('quiz-zone');
  if(quizIdx>=quizOrder.length){ renderResult(); return; }
  const q=QUIZ[quizOrder[quizIdx]];
  const order=shuffle(q.choices.map((_,i)=>i));
  let h='<div class="quiz-top"><span class="quiz-count">第'+(quizIdx+1)+'問 / '+quizOrder.length+'問</span><span class="quiz-score">正解 '+quizScore+'</span></div>';
  h+='<div class="quiz-q">'+q.q+'</div><div class="quiz-choices">';
  order.forEach(ci=>{ h+='<button class="qbtn" data-ci="'+ci+'">'+q.choices[ci]+'</button>'; });
  h+='</div><button class="quiz-next" id="quizNext">つぎのもんだい ▶</button>';
  zone.innerHTML=h;
  zone.querySelectorAll('.qbtn').forEach(btn=>btn.addEventListener('click',()=>answerQuestion(btn,q)));
  document.getElementById('quizNext').addEventListener('click',()=>{ quizIdx++; renderQuestion(); });
}
function answerQuestion(btn,q){
  const zone=document.getElementById('quiz-zone');
  const chosen=+btn.dataset.ci;
  zone.querySelectorAll('.qbtn').forEach(b=>{
    b.disabled=true; const ci=+b.dataset.ci;
    if(ci===q.answer) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
  });
  if(chosen===q.answer){ quizScore++; speak('みごと、正解じゃ！　'+q.explain,'seikai'); }
  else { speak('むむ、ちがうのう。正しくは「'+q.choices[q.answer]+'」じゃ。'+q.explain); }
  zone.querySelector('.quiz-score').textContent='正解 '+quizScore;
  document.getElementById('quizNext').classList.add('show');
}
function renderResult(){
  const zone=document.getElementById('quiz-zone');
  const r=quizScore, n=quizOrder.length; let msg;
  if(r===n) msg='あっぱれ！　全問正解じゃ。そなた、わしのことをよう知っておる。';
  else if(r>=n*0.7) msg='よくできたのう！　なかなかの物知りじゃ。';
  else if(r>=n*0.4) msg='まずまずじゃ。もう一度いどんで、さらにくわしくなるがよい。';
  else msg='うむ、これからじゃ。問答や年表で学んで、また挑戦せよ。';
  zone.innerHTML='<div class="quiz-result"><div style="color:var(--kin-akarui);letter-spacing:.1em;">けっか</div><div class="big">'+n+'問中 '+r+'問 正解！</div><button class="quiz-next show" id="quizAgain">もう一度いどむ ▶</button></div>';
  document.getElementById('quizAgain').addEventListener('click',startQuiz);
  speak(msg, r===n?'seikai':'talk');
}

 {y:"1399年",t:"金閣ほぼ完成・応永の乱",d:"金色の金閣がそびえ、相国寺には109mの七重塔も。大名・大内義弘を堺で討った。"},
 {y:"1401年",t:"明に使いをおくる（日本国王）",d:"明と国交をひらき、皇帝はわしを『日本国王』と認めた。"},
 {y:"1404年",t:"勘合貿易が始まる",d:"合い札『勘合』を使い、海ぞくの倭寇と区別して、明と商売をした。"},
 {y:"1408年",t:"義満、死去（享年51）",d:"風邪をこじらせ病にたおれた。栄華(えいが)をきわめた一生であったな。"}
];
const tlEl=document.getElementById('tl');
TIMELINE.forEach((e,i)=>{
  const d=document.createElement('div');
  d.className='tl-item'; d.dataset.i=i;
  d.innerHTML='<div class="tl-year">'+e.y+'</div><div class="tl-title">'+e.t+'</div>';
  d.addEventListener('click',()=>{
    document.querySelectorAll('.tl-item').forEach(x=>x.classList.remove('sel'));
    d.classList.add('sel');
    speak(e.y+'――'+e.t+'。'+e.d);
  });
  tlEl.appendChild(d);
});


// 最初のあいさつ
speak(GREET);
</script>
